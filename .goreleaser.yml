version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: atfexport
    binary: atfexport
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^feat:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix:'
      order: 1
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## Release {{.Tag}}

    Multi-platform binaries for the Airbyte to Terraform converter CLI tool.

    **Note**: This is experimental software not officially supported by Airbyte.
  footer: |
    ## Installation

    Download the appropriate binary for your platform from the assets below, extract it, and add it to your PATH.

    For detailed usage instructions, see the [README](https://github.com/Airbyte-Solutions-Team/existing-connectors-to-terraform/blob/main/README.md).
